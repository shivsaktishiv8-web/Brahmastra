name: Brahmastra_Final_Build
on:
  push:
    branches: [ main ]
  workflow_dispatch: # 🔱 Ye hai wo button jo aapko chahiye

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup System
        run: |
          sudo apt update
          sudo apt install -y python3-pip build-essential git python3 python3-dev ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libssl-dev libjpeg-dev zlib1g-dev libffi8 liblzma-dev uuid-dev openjdk-17-jdk
      - name: Build APK
        run: |
          pip3 install --user --upgrade buildozer cython==0.29.36 virtualenv
          export PATH=$PATH:$HOME/.local/bin
          # Force build
          yes | buildozer android debug || yes | buildozer android debug
          # Find APK and rename
          find . -name "*.apk" -exec cp {} ./brahmastra_app.apk \;
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Download_Brahmastra_APK
          path: brahmastra_app.apk
