name: Brahmastra_Final_Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04 # Stable version use karo
    steps:
      - uses: actions/checkout@v4
      - name: Clean and Install
        run: |
          sudo apt update
          sudo apt install -y python3-pip build-essential git python3 python3-dev ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libssl-dev libjpeg-dev zlib1g-dev libffi-dev liblzma-dev uuid-dev openjdk-17-jdk
          pip3 install --user --upgrade buildozer cython==0.29.36 virtualenv
      - name: Build APK
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # 🔱 Hacker Tip: Buildozer ko batana ki fresh build kare
          buildozer android clean
          yes | buildozer android debug
          find . -name "*.apk" -exec cp {} ./brahmastra.apk \;
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Brahmastra-App
          path: brahmastra.apk

